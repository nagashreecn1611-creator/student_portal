<!DOCTYPE html>
<html>
<head>
<title>Prediction Graph</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:#f4f4f4;">

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="{{ url_for('dashboard') }}">
Student Portal
</a>

<div>
<a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">
Dashboard
</a>

<a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">
Logout
</a>

</div>
</div>
</nav>

<div class="container mt-4">

<h2 class="mb-4 text-center">
Student Performance Prediction Graph
</h2>

<div class="card shadow">

<div class="card-body text-center">

{% if students and students|length > 0 %}

<img src="{{ url_for('graph_png') }}" class="img-fluid">

{% else %}

<p class="text-muted">
No students available. Add students to generate graph.
</p>

{% endif %}

</div>

</div>

</div>

</body>
</html>
