<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Student Performance Prediction</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">Upload</button>
</form>

<form action="/predict" method="POST">
    <div class="mb-3">
        <label>Study Time</label>
        <input type="number" name="studytime" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Absences</label>
        <input type="number" name="absences" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Previous Grade 1</label>
        <input type="number" name="g1" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Previous Grade 2</label>
        <input type="number" name="g2" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Predict</button>
</form>

</body>
</html>
