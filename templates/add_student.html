<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f4f4f4;">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">Student Portal</a>
        <div>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Add Student + Performance Data</h4>
                </div>

                <div class="card-body">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{category}}">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <h5 class="mb-3">Student Details</h5>

                        <div class="mb-3">
                            <label class="form-label">Student Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter student name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label>
                            <input type="text" name="course" class="form-control" placeholder="Enter course (example: Java)" required>
                        </div>

                        <hr>

                        <h5 class="mb-3">Performance Inputs</h5>

                        <div class="mb-3">
                            <label class="form-label">Study Time (hours/week)</label>
                            <input type="number" step="0.1" name="study_time" class="form-control" placeholder="Example: 10" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Absences</label>
                            <input type="number" name="absences" class="form-control" placeholder="Example: 2" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Previous Grade 1 (0 - 20)</label>
                            <input type="number" step="0.1" name="g1" class="form-control" placeholder="Example: 15" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Previous Grade 2 (0 - 20)</label>
                            <input type="number" step="0.1" name="g2" class="form-control" placeholder="Example: 16" required>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success">Save Student</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-sm">Back to Dashboard</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
