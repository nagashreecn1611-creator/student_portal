<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Welcome {{ current_user.username }}</h2>

<form method="POST">
    Study Time (1-4): <input type="number" name="studytime" required><br><br>
    Absences: <input type="number" name="absences" required><br><br>
    G1: <input type="number" name="g1" required><br><br>
    G2: <input type="number" name="g2" required><br><br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <h3>Predicted Final Score: {{ prediction }}</h3>
{% endif %}

<form action="/download_pdf" method="POST">
    <input type="hidden" name="studytime" value="{{ request.form.studytime }}">
    <input type="hidden" name="absences" value="{{ request.form.absences }}">
    <input type="hidden" name="g1" value="{{ request.form.g1 }}">
    <input type="hidden" name="g2" value="{{ request.form.g2 }}">
    <button type="submit">Download PDF</button>
</form>

<a href="/logout">Logout</a>

</body>
</html>
